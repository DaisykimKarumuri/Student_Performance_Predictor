<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h2>Student Performance Predictor</h2>

<form action="/predict" method="post">

    <input type="number" name="study"
       placeholder="Study Hours"
       value="{{ study if study else '' }}" required>

    <input type="number" name="attendance"
       placeholder="Attendance"
       value="{{ attendance if attendance else '' }}" required>

    <input type="number" name="previous"
       placeholder="Previous Marks"
       value="{{ previous if previous else '' }}" required>

    <input type="number" name="assignment"
       placeholder="Assignment Score"
       value="{{ assignment if assignment else '' }}" required>
    <button type="submit">Predict</button>

</form>


<h3>Predicted Marks: {{ prediction }}</h3>
<h3>Performance: {{ category }}</h3>
<h3>Remark:</h3>
<p>{{ remark }}</p>
</div>

</body>
</html>
